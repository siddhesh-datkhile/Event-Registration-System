server.port=8080

spring.application.name=api-gateway

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Event Service
spring.cloud.gateway.routes[1].id=event-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/events/**

# Registration Service
spring.cloud.gateway.routes[2].id=registration-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/registrations/**

# ===============================
# JWT Configuration (must match auth_service)
# ===============================
jwt.secret=mySuperSecretKeyWithAtLeast256BitsLength


spring.security.user.name=admin
spring.security.user.password=admin
# ===============================
# Disable Eureka (IMPORTANT for now)
# ===============================
eureka.client.enabled=false
spring.cloud.discovery.enabled=false