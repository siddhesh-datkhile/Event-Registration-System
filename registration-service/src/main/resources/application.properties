spring.application.name=registration-service

server.port=8083

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require
spring.docker.compose.enabled=false

eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=${EUREKA_DEFAULT_ZONE}


# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Circuit Breaker Configuration
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true

resilience4j.circuitbreaker.instances.event-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.event-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.event-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.event-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.event-service.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=5
